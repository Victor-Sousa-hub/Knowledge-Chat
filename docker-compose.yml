services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: knowledge-backend
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    environment:
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - PIP_CERT=/etc/ssl/certs/ca-certificates.crt
      - AWS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    volumes:
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      - knowledge-net
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend/my-app
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL uses localhost because the browser (not the container)
        # is who calls the backend — it reaches it through the host-exposed port 8000
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: knowledge-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - knowledge-net
    restart: unless-stopped

networks:
  knowledge-net:
    driver: bridge
